<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Premium | Roblox Script</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --card-bg: #161b22;
            --text: #ffffff;
            --accent: #ff00ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Animated Gradient Background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.15) 0%, transparent 50%);
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.5); opacity: 0.8; }
        }

        /* Container & Animations */
        .container {
            max-width: 900px;
            width: 90%;
            text-align: center;
            padding: 40px 0;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.5));
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 40px;
        }

        /* Script Card */
        .script-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .script-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(79, 172, 254, 0.2);
            border-color: var(--secondary);
        }

        .code-block {
            background: #0d1117;
            padding: 20px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #58a6ff;
            text-align: left;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Button & Glow */
        .copy-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 15px 40px;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        }

        .copy-btn:hover {
            box-shadow: 0 0 40px rgba(79, 172, 254, 0.8);
            transform: scale(1.05);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .copy-btn:hover::after {
            left: 120%;
        }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glow-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <h1>Universal Premium</h1>
        <p class="subtitle">Elevate your gameplay with the most advanced multi-game script.</p>

        <div class="script-card">
            <div class="code-block" id="loadstring">
loadstring(game:HttpGet("https://raw.githubusercontent.com/cosmicsys/netf/main/script.lua"))()
            </div>
            <button class="copy-btn" onclick="copyScript()">Copy Loadstring</button>
        </div>

        <div class="features">
            <div class="feature-item">Rayfield UI Library</div>
            <div class="feature-item">Custom Speed & Jump</div>
            <div class="feature-item">Advanced Flight</div>
            <div class="feature-item">20+ Premium Features</div>
        </div>
    </div>

    <script>
        function copyScript() {
            const code = document.getElementById('loadstring').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.style.background = 'linear-gradient(45deg, #00c853, #b2ff59)';
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = 'linear-gradient(45deg, var(--primary), var(--secondary))';
                }, 2000);
            });
        }

        // Mouse Glow Effect
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.1) return;
            const dot = document.createElement('div');
            dot.className = 'glow-dot';
            dot.style.left = e.pageX + 'px';
            dot.style.top = e.pageY + 'px';
            document.body.appendChild(dot);
            
            setTimeout(() => {
                dot.style.opacity = '0';
                setTimeout(() => dot.remove(), 1000);
            }, 100);
        });
    </script>
</body>
</html>

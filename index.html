<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETF - Stream Movies & TV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav id="navbar">
        <div class="nav-left">
            <h1 class="logo">NETF</h1>
            <ul class="nav-links">
                <li class="active" onclick="showHome()">Home</li>
                <li onclick="fetchCategory('tv')">TV Shows</li>
                <li onclick="fetchCategory('movie')">Movies</li>
                <li>New & Popular</li>
                <li>My List</li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by IMDB ID (tt...) or Name">
                <button onclick="handleSearch()">Search</button>
            </div>
            <div class="profile-icon"></div>
        </div>
    </nav>

    <main>
        <section id="hero">
            <div class="hero-content">
                <h1 id="heroTitle">Featured Movie</h1>
                <p id="heroDescription">Loading featured content...</p>
                <div class="hero-buttons">
                    <button class="play-btn" onclick="openPlayer('tt17048514', 'movie')">▶ Play</button>
                    <button class="info-btn">ⓘ More Info</button>
                </div>
            </div>
            <div class="hero-vignette"></div>
        </section>

        <section id="content-rows">
            <div class="row">
                <h2>Top Picks for You</h2>
                <div class="movie-list" id="top-picks">
                    <!-- Hardcoded Top Picks -->
                    <div class="movie-card" onclick="openPlayer('tt15327232', 'movie')">
                        <img src="https://image.tmdb.org/t/p/w500/8Gxv8S7eeG0ZnmpP8S3S3szjbs6.jpg" alt="Oppenheimer">
                        <div class="movie-info-overlay"><p>Oppenheimer</p></div>
                    </div>
                    <div class="movie-card" onclick="openPlayer('tt1630029', 'movie')">
                        <img src="https://image.tmdb.org/t/p/w500/iuFNm91uH6crSRPLpDssURgYvDf.jpg" alt="Avatar 2">
                        <div class="movie-info-overlay"><p>Avatar: The Way of Water</p></div>
                    </div>
                    <div class="movie-card" onclick="openPlayer('tt14624432', 'movie')">
                        <img src="https://image.tmdb.org/t/p/w500/6v89_V1_WvM_Z_E_N_S_v_e_r_s_e.jpg" alt="Spider-Man">
                        <div class="movie-info-overlay"><p>Spider-Man: Across the Spider-Verse</p></div>
                    </div>
                    <div class="movie-card" onclick="openPlayer('tt11152168', 'movie')">
                        <img src="https://image.tmdb.org/t/p/w500/1X7v_R_k_r_v_A_v_i_V_Z_Z_G.jpg" alt="Dune 2">
                        <div class="movie-info-overlay"><p>Dune: Part Two</p></div>
                    </div>
                </div>
            </div>
            <div class="row">
                <h2>New Releases</h2>
                <div class="movie-list" id="new-releases"></div>
            </div>
            <div class="row">
                <h2>Recently Added Movies</h2>
                <div class="movie-list" id="recently-added-movies"></div>
            </div>
            <div class="row">
                <h2>Latest TV Shows</h2>
                <div class="movie-list" id="latest-tv"></div>
            </div>
        </section>
    </main>

    <!-- Player Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePlayer()">&times;</span>
            <div class="iframe-container">
                <iframe id="vidsrc-iframe" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="player-controls" id="tv-controls" style="display: none;">
                <input type="number" id="seasonInput" placeholder="S" min="1" value="1">
                <input type="number" id="episodeInput" placeholder="E" min="1" value="1">
                <button onclick="updateTVPlayer()">Load Episode</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal | Cosmic Infinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030108;
            --surface: #0a0515;
            --border: rgba(150, 50, 255, 0.2);
            --accent: #ffffff;
            --muted: #888888;
            --space-unit: 24px;
            --radius-large: 24px;
            --radius-medium: 12px;
            --cosmic-glow: 0 0 30px rgba(150, 50, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: calc(var(--space-unit) * 4) var(--space-unit);
        }

        /* Deep Space Starfield */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 100px 150px, #a855f7, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 200px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 250px, #3b82f6, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 400px 400px;
            opacity: 0.3;
            z-index: -1;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 400px 800px; }
        }

        .header {
            text-align: center;
            margin-bottom: calc(var(--space-unit) * 4);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            background: linear-gradient(to right, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-unit);
        }

        .hero-text {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -0.04em;
            max-width: 800px;
            line-height: 1;
            filter: drop-shadow(var(--cosmic-glow));
        }

        .content {
            width: 100%;
            max-width: 800px;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .copy-section {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: calc(var(--space-unit) * 2.5);
            border-radius: var(--radius-large);
            margin-bottom: calc(var(--space-unit) * 2.5);
            box-shadow: var(--cosmic-glow);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .copy-section:hover {
            border-color: rgba(150, 50, 255, 0.5);
            transform: scale(1.02);
        }

        .code-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #d8b4fe;
            margin-bottom: calc(var(--space-unit) * 2);
            line-height: 1.6;
            word-break: break-all;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: var(--radius-medium);
            border-left: 4px solid #a855f7;
        }

        .button-row {
            display: flex;
            justify-content: flex-start;
        }

        .copy-trigger {
            background: linear-gradient(45deg, #a855f7, #3b82f6);
            border: none;
            color: var(--accent);
            padding: 14px 40px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3);
        }

        .copy-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.5);
            filter: brightness(1.1);
        }

        .features {
            display: flex;
            gap: calc(var(--space-unit) * 2);
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .feature {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        .feature:hover {
            color: #fff;
        }

        .dot {
            color: #4c1d95;
            margin: 0 4px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 10px; }

        @media (max-width: 800px) {
            .hero-text { font-size: 42px; }
            .features { flex-direction: column; align-items: center; gap: 12px; }
            .dot { display: none; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="header">
        <h1>Cosmic Infinity</h1>
        <div class="hero-text">The absolute peak of engine optimization.</div>
    </div>

    <div class="content">
        <div class="copy-section">
            <div class="code-display" id="script-text">loadstring(game:HttpGet("https://raw.githubusercontent.com/cosmicsys/netf/main/script.lua"))()</div>
            <div class="button-row">
                <button class="copy-trigger" onclick="copy()">Copy Script</button>
            </div>
        </div>

        <div class="features">
            <span class="feature">INFINITY ENGINE</span>
            <span class="dot">•</span>
            <span class="feature">MAX QUALITY ZERO LAG</span>
            <span class="dot">•</span>
            <span class="feature">DLSS 3.5 AI UPSCALE</span>
            <span class="dot">•</span>
            <span class="feature">INSTANT RESPONSE</span>
        </div>
    </div>

    <script>
        function copy() {
            const text = document.getElementById('script-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-trigger');
                const originalText = btn.innerText;
                btn.innerText = 'INFINITY SYNCED';
                btn.style.background = '#22c55e';
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = 'linear-gradient(45deg, #a855f7, #3b82f6)';
                }, 2000);
            });
        }
    </script>
</body>
</html>

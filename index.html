<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal | Premium Scripting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --muted: #666666;
            --space-unit: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: calc(var(--space-unit) * 4) var(--space-unit);
        }

        /* Subtle Starfield */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.15;
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: calc(var(--space-unit) * 4);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: var(--space-unit);
        }

        .hero-text {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -0.02em;
            max-width: 600px;
            line-height: 1.1;
        }

        /* Container with Space */
        .content {
            width: 100%;
            max-width: 720px;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .copy-section {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: calc(var(--space-unit) * 1.5);
            border-radius: 4px;
            margin-bottom: calc(var(--space-unit) * 2);
            transition: border-color 0.4s;
            position: relative;
        }

        .copy-section:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .code-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #888;
            margin-bottom: calc(var(--space-unit) * 1.5);
            line-height: 1.6;
            word-break: break-all;
        }

        .button-row {
            display: flex;
            justify-content: flex-start;
        }

        .copy-trigger {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 10px 24px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 2px;
        }

        .copy-trigger:hover {
            background: var(--accent);
            color: var(--bg);
        }

        /* Features List - Minimal */
        .features {
            display: flex;
            gap: calc(var(--space-unit) * 1.5);
            justify-content: center;
            flex-wrap: wrap;
        }

        .feature {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .dot {
            color: #333;
            margin: 0 4px;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimal scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        @media (max-width: 600px) {
            .hero-text { font-size: 32px; }
            .features { flex-direction: column; align-items: center; gap: 8px; }
            .dot { display: none; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="header">
        <h1>Premium Universal</h1>
        <div class="hero-text">The standard for universal execution.</div>
    </div>

    <div class="content">
        <div class="copy-section">
            <div class="code-display" id="script-text">loadstring(game:HttpGet("https://raw.githubusercontent.com/cosmicsys/netf/main/script.lua"))()</div>
            <div class="button-row">
                <button class="copy-trigger" onclick="copy()">Copy Script</button>
            </div>
        </div>

        <div class="features">
            <span class="feature">RAYFIELD INTERFACE</span>
            <span class="dot">•</span>
            <span class="feature">MOVEMENT ENGINE</span>
            <span class="dot">•</span>
            <span class="feature">UTILITY SUITE</span>
            <span class="dot">•</span>
            <span class="feature">20+ CORE FEATURES</span>
        </div>
    </div>

    <script>
        function copy() {
            const text = document.getElementById('script-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-trigger');
                const originalText = btn.innerText;
                btn.innerText = 'Copied to clipboard';
                btn.style.borderColor = '#ffffff';
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                }, 2000);
            });
        }
    </script>
</body>
</html>
